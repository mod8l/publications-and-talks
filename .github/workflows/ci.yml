name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate index
        run: make index

      - name: Verify README is up to date
        run: |
          if [[ -n $(git status --porcelain README.md) ]]; then
            echo "README.md is out of date. Run 'make index' locally and commit the changes."
            git diff README.md
            exit 1
          fi

      - name: Lint markdown
        run: make lint
